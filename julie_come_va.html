<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Julie come">
<meta name="color-scheme" content="light">
<title>Julie come 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light only;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#FFFFFF!important;font-family:'DM Sans',-apple-system,sans-serif;color:#1C1B1F!important;overflow:hidden;}
:root{
  --r:#F472B6;--rd:#DB2777;--rl:#FDF2F8;--rm:#FBCFE8;
  --l:#A78BFA;--ll:#F5F3FF;--lm:#EDE9FE;
  --m:#34D399;--ml:#ECFDF5;--mm:#D1FAE5;
  --p:#FB923C;--pl:#FFF7ED;--pm:#FED7AA;
  --s:#38BDF8;--sl:#F0F9FF;--sm:#BAE6FD;
  --a:#FBBF24;--al:#FFFBEB;--am:#FDE68A;
  --bg:#F8F6FF;--w:#FFFFFF;
  --b1:#F0EEF8;--b2:#E5E2F5;
  --t1:#1C1B1F;--t2:#5C5C6B;--t3:#A0A0B0;
}
.app{max-width:393px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);}
.topbar{background:#fff!important;border-bottom:1.5px solid var(--b1);padding:env(safe-area-inset-top,44px) 18px 0;flex-shrink:0;}
.topbar-inner{padding:11px 0 12px;display:flex;align-items:center;justify-content:space-between;}
.logo-row{display:flex;align-items:center;gap:9px;}
.logo-box{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#FBCFE8,#EDE9FE);display:flex;align-items:center;justify-content:center;font-size:19px;}
.app-name{font-family:'DM Serif Display',serif;font-size:20px;color:var(--t1)!important;}
.day-chip{background:var(--rm);color:var(--rd);font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:14px 14px 28px;}
.page.on{display:block;}
.nav{background:#fff!important;border-top:1.5px solid var(--b1);padding:6px 0 env(safe-area-inset-bottom,16px);display:flex;flex-shrink:0;}
.nb{flex:1;padding:7px 3px 4px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:12px;font-size:10px;font-weight:500;font-family:inherit;color:var(--t3);transition:all .2s;}
.nb.on{color:var(--rd);background:var(--rl);}
.nb-i{font-size:21px;line-height:1;}

/* CARDS */
.card{background:#fff!important;border-radius:20px;padding:15px;margin-bottom:11px;border:1.5px solid var(--b1);}
.stitle{font-size:10px;font-weight:700;color:var(--t3)!important;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}

/* CALENDAR */
.wknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.wklbl{font-family:'DM Serif Display',serif;font-size:17px;color:var(--t1)!important;}
.wkarr{width:33px;height:33px;border-radius:10px;background:var(--rl);border:none;color:var(--rd);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.daygrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:13px;}
.dcell{display:flex;flex-direction:column;align-items:center;padding:5px 1px 3px;border-radius:11px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.dcell .dn{font-size:9px;font-weight:700;color:var(--t3)!important;text-transform:uppercase;}
.dcell .dd{font-size:14px;font-weight:500;color:var(--t1)!important;margin-top:1px;}
.dcell .ddot{width:5px;height:5px;border-radius:50%;background:var(--a);margin-top:2px;visibility:hidden;}
.dcell.food .ddot{visibility:visible;}
.dcell.today{border-color:var(--rm);}
.dcell.sel{background:var(--rd)!important;border-color:var(--rd);}
.dcell.sel .dn,.dcell.sel .dd{color:#fff!important;}

/* NUEVO */
.ncard{border-radius:20px;padding:18px;margin-bottom:11px;}
.nc-n{background:linear-gradient(135deg,#FDF2F8,#F5F3FF);}
.nc-a{background:linear-gradient(135deg,#FFF1F2,#FEE2E2);}
.nctag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
.nctag.n{color:var(--rd);}
.nctag.a{color:#DC2626;}
.ncnom{font-family:'DM Serif Display',serif;font-size:23px;color:var(--t1)!important;margin-bottom:5px;line-height:1.2;}
.ncnote{font-size:13px;color:var(--t2)!important;line-height:1.5;}
.abox{margin-top:9px;background:rgba(254,226,226,.85);border-radius:10px;padding:9px 12px;font-size:12px;color:#991B1B;line-height:1.4;}

/* GRUPOS */
.grow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--b1);}
.grow:last-child{border:none;}
.gdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.gc{background:#FBBF24;}.gv{background:#34D399;}.gp{background:#F87171;}.gf{background:#38BDF8;}.gg{background:#A78BFA;}
.glbl{font-size:11px;font-weight:500;color:var(--t3)!important;width:58px;flex-shrink:0;}
.gval{font-size:13px;color:var(--t1)!important;flex:1;line-height:1.3;}
.gbtn{font-size:11px;font-weight:600;color:var(--rd);background:var(--rl);border:none;border-radius:8px;padding:4px 9px;cursor:pointer;flex-shrink:0;font-family:inherit;}

/* HORARIO */
.hrow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--b1);}
.hrow:last-child{border:none;}
.hhora{font-size:12px;font-weight:600;color:var(--t2)!important;width:44px;flex-shrink:0;}
.htxt{font-size:13px;color:var(--t1)!important;flex:1;line-height:1.3;}
.hpill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;flex-shrink:0;}
.hpl{background:#DBEAFE;color:#1D4ED8;}
.hpc{background:var(--mm);color:#065F46;}
.hps{background:var(--lm);color:#5B21B6;}
.hpa{background:var(--am);color:#92400E;}

/* AGUA TRACKER */
.agua-card{background:#fff!important;border-radius:20px;padding:15px;margin-bottom:11px;border:1.5px solid var(--b1);}
.agua-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.agua-meta{font-size:12px;color:var(--t2)!important;}
.agua-vasos{display:flex;gap:10px;justify-content:center;margin:4px 0 8px;}
.vaso-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:none;border:none;font-family:inherit;}
.vaso-ico{font-size:28px;line-height:1;transition:all .2s;filter:grayscale(1) opacity(.35);}
.vaso-btn.done .vaso-ico{filter:none;}
.vaso-lbl{font-size:10px;font-weight:500;color:var(--t3)!important;}
.vaso-btn.done .vaso-lbl{color:var(--s)!important;}
.agua-note{font-size:11px;color:var(--t3)!important;text-align:center;font-style:italic;}

/* PORCION BADGE */
.porcion-badge{display:inline-flex;align-items:center;gap:5px;background:var(--am);color:#92400E;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:11px;}

/* ALIMENTOS PAGE */
.ali-hint{font-size:12px;color:var(--t2)!important;margin-bottom:13px;line-height:1.5;padding:10px 12px;background:var(--rl);border-radius:12px;}
.grupo-section{margin-bottom:16px;}
.grupo-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.grupo-hdr-dot{width:12px;height:12px;border-radius:50%;}
.grupo-hdr-title{font-size:14px;font-weight:600;color:var(--t1)!important;}
.ali-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;}
.ali-chip{padding:9px 11px;border-radius:13px;border:1.5px solid var(--b1);background:#fff!important;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;}
.ali-chip.sc{border-width:2px;}
.sc-c{border-color:#FBBF24;background:var(--al)!important;}
.sc-v{border-color:#34D399;background:var(--ml)!important;}
.sc-p{border-color:#F87171;background:#FFF1F2!important;}
.sc-f{border-color:#38BDF8;background:var(--sl)!important;}
.sc-g{border-color:#A78BFA;background:var(--ll)!important;}
.ali-chip-name{font-size:12px;font-weight:500;color:var(--t1)!important;flex:1;line-height:1.3;}
.adot{width:6px;height:6px;border-radius:50%;background:#F87171;margin-left:auto;flex-shrink:0;}
.aprobar-btn{width:100%;padding:13px;background:var(--rd);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;transition:all .2s;}
.aprobar-btn:active{transform:scale(.98);}

/* RECETAS */
.rec-cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.rec-cats::-webkit-scrollbar{display:none;}
.rcbtn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid var(--b1);background:#fff!important;cursor:pointer;font-family:inherit;color:var(--t2);white-space:nowrap;flex-shrink:0;transition:all .15s;}
.rcbtn.on{background:var(--rd)!important;border-color:var(--rd);color:#fff;}
.rcard{background:#fff!important;border-radius:18px;border:1.5px solid var(--b1);margin-bottom:10px;overflow:hidden;}
.rtop{padding:13px;display:flex;gap:11px;cursor:pointer;align-items:flex-start;}
.remo{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.re-n{background:linear-gradient(135deg,var(--rl),var(--ll));}
.re-a{background:linear-gradient(135deg,#FFF1F2,#FFE4E6);}
.re-v{background:linear-gradient(135deg,var(--ml),var(--sl));}
.re-c{background:linear-gradient(135deg,var(--al),var(--pl));}
.rinfo{flex:1;min-width:0;}
.rtit{font-size:14px;font-weight:600;color:var(--t1)!important;margin-bottom:2px;}
.rsub{font-size:12px;color:var(--t2)!important;}
.rtags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.rtag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.rt-c{background:var(--al);color:#92400E;}.rt-v{background:var(--ml);color:#065F46;}
.rt-p{background:#FFF1F2;color:#9F1239;}.rt-f{background:var(--sl);color:#0C4A6E;}
.rt-g{background:var(--ll);color:#4C1D95;}.rt-a{background:#FEE2E2;color:#991B1B;}
.rchev{font-size:12px;color:var(--t3);flex-shrink:0;margin-top:2px;transition:transform .2s;}
.rchev.open{transform:rotate(180deg);}
.rbody{display:none;padding:0 13px 13px;}
.rbody.open{display:block;}
.rsec{font-size:10px;font-weight:700;color:var(--t3)!important;text-transform:uppercase;letter-spacing:.07em;margin:10px 0 5px;}
.ring{font-size:13px;color:var(--t2)!important;padding:2px 0;line-height:1.5;}
.ring::before{content:"· ";}
.rpaso{display:flex;gap:7px;padding:3px 0;}
.rpn{font-size:13px;font-weight:700;color:var(--rd);flex-shrink:0;}
.rpt{font-size:13px;color:var(--t1)!important;line-height:1.5;}
.rnota{margin-top:9px;background:var(--rl);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--rd);font-style:italic;line-height:1.4;}
.rmark{width:100%;margin-top:11px;padding:11px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.rmark.off{background:var(--rd);color:#fff;}
.rmark.on{background:var(--mm);color:#065F46;}
.cat-sec{margin-bottom:6px;}
.cat-lbl{font-size:13px;font-weight:600;color:var(--t1)!important;margin-bottom:8px;padding-left:2px;}

/* PROGRESO */
.stats-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:13px;}
.sc2{border-radius:16px;padding:13px 12px;display:flex;flex-direction:column;gap:3px;}
.scr{background:linear-gradient(135deg,var(--rl),var(--rm));}
.scl{background:linear-gradient(135deg,var(--ll),var(--lm));}
.scm{background:linear-gradient(135deg,var(--ml),var(--mm));}
.scp{background:linear-gradient(135deg,var(--pl),var(--pm));}
.sc-ico{font-size:22px;}
.sc-num{font-family:'DM Serif Display',serif;font-size:30px;color:var(--t1)!important;line-height:1;}
.sc-lbl{font-size:11px;font-weight:500;color:var(--t2)!important;}
.alirow{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--b1);}
.alirow:last-child{border:none;}
.alidot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.aliinfo{flex:1;min-width:0;}
.aliname{font-size:13px;font-weight:500;color:var(--t1)!important;}
.alicnt{font-size:11px;color:var(--t3)!important;margin-top:1px;}
.expdots{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.exdot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--b2);background:#fff!important;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.exdot.dn{background:var(--r)!important;border-color:var(--rd);color:#fff;}
.exdot.da{background:#FCA5A5!important;border-color:#EF4444;color:#fff;}
.mkbtn{font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;flex-shrink:0;}
.mkbtn.off{background:var(--rl);color:var(--rd);}
.mkbtn.on{background:var(--mm);color:#065F46;}
.abadge{font-size:9px;background:#FEE2E2;color:#991B1B;padding:1px 6px;border-radius:20px;font-weight:700;}

/* COMPRAS */
.chead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.chead-t{font-family:'DM Serif Display',serif;font-size:20px;color:var(--t1)!important;}
.rst{font-size:12px;color:var(--rd);background:none;border:none;cursor:pointer;font-family:inherit;}
.pbarw{height:6px;background:var(--b1);border-radius:6px;overflow:hidden;margin-bottom:14px;}
.pbar{height:100%;background:linear-gradient(90deg,var(--r),var(--l));border-radius:6px;transition:width .4s;}
.clbl{font-size:10px;font-weight:700;color:var(--t3)!important;text-transform:uppercase;letter-spacing:.07em;margin:12px 0 6px;}
.crow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--b1);cursor:pointer;}
.crow:last-child{border:none;}
.chk{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
.chk.on{background:var(--rd);border-color:var(--rd);color:#fff;}
.ctxt{font-size:13px;color:var(--t1)!important;flex:1;line-height:1.3;}
.ctxt.done{text-decoration:line-through;color:var(--t3)!important;}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.mov.open{display:flex;}
.msh{background:#fff!important;border-radius:26px 26px 0 0;width:100%;max-width:393px;max-height:78dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,20px);animation:sup .3s cubic-bezier(.4,0,.2,1);}
@keyframes sup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mhdl{width:36px;height:4px;background:var(--b1);border-radius:4px;margin:12px auto 14px;}
.mhd{padding:0 20px 12px;border-bottom:1px solid var(--b1);}
.mtit{font-family:'DM Serif Display',serif;font-size:19px;color:var(--t1)!important;margin-bottom:2px;}
.msub{font-size:13px;color:var(--t2)!important;}
.mopts{flex:1;overflow-y:auto;padding:13px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;}
.mopt{padding:10px 11px;border-radius:11px;border:1.5px solid var(--b1);background:#fff!important;font-size:13px;cursor:pointer;text-align:left;font-family:inherit;color:var(--t1);transition:all .15s;line-height:1.4;}
.mopt.sel{border-color:var(--rd);background:var(--rl)!important;color:var(--rd);font-weight:600;}
.macts{padding:12px 20px 0;display:flex;gap:8px;}
.msave{flex:1;padding:13px;background:var(--rd);color:#fff;border:none;border-radius:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.mcancel{padding:13px 15px;background:#fff!important;color:var(--t2);border:1.5px solid var(--b1);border-radius:13px;font-size:14px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo-row">
      <div class="logo-box">🌸</div>
      <span class="app-name">Julie come</span>
    </div>
    <span class="day-chip" id="day-chip">Día 1</span>
  </div>
</div>
<div class="scroll">

  <!-- HOY -->
  <div class="page on" id="pg-hoy">
    <div class="wknav">
      <button class="wkarr" onclick="prevW()">←</button>
      <span class="wklbl" id="wklbl"></span>
      <button class="wkarr" onclick="nextW()">→</button>
    </div>
    <div class="daygrid" id="daygrid"></div>
    <div id="hoy-body"></div>
  </div>

  <!-- ALIMENTOS -->
  <div class="page" id="pg-alimentos">
    <p class="ali-hint">Selecciona los alimentos que quieres incluir en el menú de Julie. Los alérgenos tienen el punto rojo — recuerda ofrecerlos 3 días seguidos.</p>
    <div id="ali-grupos"></div>
    <button class="aprobar-btn" onclick="aprobar()">Guardar selección ✓</button>
  </div>

  <!-- RECETAS -->
  <div class="page" id="pg-recetas">
    <div class="rec-cats" id="rec-cats"></div>
    <div id="rec-list"></div>
  </div>

  <!-- PROGRESO -->
  <div class="page" id="pg-progreso">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <div class="stitle">Alimentos introducidos — toca para registrar</div>
      <div id="ali-tracker"></div>
    </div>
  </div>

  <!-- COMPRAS -->
  <div class="page" id="pg-compras">
    <div class="chead">
      <span class="chead-t">Esta semana</span>
      <button class="rst" onclick="resetC()">Limpiar</button>
    </div>
    <div class="pbarw"><div class="pbar" id="pbar" style="width:0"></div></div>
    <div id="compras-body"></div>
  </div>

</div>
<nav class="nav">
  <button class="nb on" onclick="nav('hoy',this)"><span class="nb-i">🌸</span>Hoy</button>
  <button class="nb" onclick="nav('alimentos',this)"><span class="nb-i">🥕</span>Alimentos</button>
  <button class="nb" onclick="nav('recetas',this)"><span class="nb-i">🍳</span>Recetas</button>
  <button class="nb" onclick="nav('progreso',this)"><span class="nb-i">📊</span>Progreso</button>
  <button class="nb" onclick="nav('compras',this)"><span class="nb-i">🛒</span>Compras</button>
</nav>
</div>

<!-- MODAL -->
<div class="mov" id="modal">
  <div class="msh">
    <div class="mhdl"></div>
    <div class="mhd">
      <div class="mtit" id="mtit">Editar grupo</div>
      <div class="msub">Selecciona uno o varios alimentos</div>
    </div>
    <div class="mopts" id="mopts"></div>
    <div class="macts">
      <button class="mcancel" onclick="closeM()">Cancelar</button>
      <button class="msave" onclick="saveM()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SK='julie26v5';
const START=new Date(2026,4,10);
const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

// Horario ajustado para Julie: 2 comidas 6-8m, despierta 6:30-7, duerme 8-8:30, comida familiar 2:30-3:30
const HORARIO=[
  {h:'6:30',  txt:'Despertar + leche materna',  t:'l'},
  {h:'8:30',  txt:'Desayuno — 5 grupos + 1 oz agua 💧', t:'c'},
  {h:'9:30',  txt:'Juego libre / estimulación', t:'j'},
  {h:'10:00', txt:'Siesta 1', t:'s'},
  {h:'12:00', txt:'Despertar + leche materna', t:'l'},
  {h:'13:00', txt:'Juego / actividades con abuela', t:'j'},
  {h:'15:00', txt:'Comida familiar — 5 grupos + 1 oz agua 💧', t:'c'},
  {h:'15:30', txt:'Leche materna', t:'l'},
  {h:'16:30', txt:'Siesta 2 (corta)', t:'s'},
  {h:'18:00', txt:'Despertar + juego tranquilo', t:'j'},
  {h:'19:30', txt:'Baño + rutina de noche', t:'j'},
  {h:'20:00', txt:'Leche materna', t:'l'},
  {h:'20:30', txt:'A dormir 🌙', t:'s'},

function dk(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function kd(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function diff(d){return Math.floor((new Date(d.getFullYear(),d.getMonth(),d.getDate())-START)/86400000)+1;}
function getWeek(){
  const t=new Date();t.setHours(0,0,0,0);
  const sun=new Date(t);sun.setDate(t.getDate()-t.getDay()+(S.weekOff*7));
  return Array.from({length:7},(_,i)=>{const d=new Date(sun);d.setDate(sun.getDate()+i);return d;});
}
function getMenu(n){if(n<1||n>15)return null;return{...MENU_BASE[n-1],...(S.overrides[n]||{})};}

// ── NAV ───────────────────────────────────────────────────────────────────
function nav(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='alimentos')renderAlimentos();
  if(name==='recetas')renderRecetas();
  if(name==='progreso')renderProgreso();
  if(name==='compras')renderCompras();
}

// ── HOY ───────────────────────────────────────────────────────────────────
function prevW(){S.weekOff--;save();renderHoy();}
function nextW(){S.weekOff++;save();renderHoy();}

function renderHoy(){
  const days=getWeek();
  const f=days[0],l=days[6];
  document.getElementById('wklbl').textContent=`${f.getDate()} ${MESES[f.getMonth()]} – ${l.getDate()} ${MESES[l.getMonth()]}`;
  const todayK=dk(new Date()),selK=S.selDate||todayK;
  const grid=document.getElementById('daygrid');grid.innerHTML='';
  days.forEach(d=>{
    const k=dk(d),n=diff(d);
    const el=document.createElement('div');
    el.className='dcell'+(k===todayK?' today':'')+(k===selK?' sel':'')+(n>=1&&n<=15?' food':'');
    el.innerHTML=`<span class="dn">${DIAS[d.getDay()]}</span><span class="dd">${d.getDate()}</span><span class="ddot"></span>`;
    el.onclick=()=>{S.selDate=k;save();renderHoy();};
    grid.appendChild(el);
  });
  const n=diff(kd(selK));
  document.getElementById('day-chip').textContent=n>=1&&n<=15?'Día '+n:'—';
  const body=document.getElementById('hoy-body');

  if(n<1){body.innerHTML=`<div class="card" style="text-align:center;padding:28px 16px;"><div style="font-size:36px;margin-bottom:10px;">🌸</div><div style="font-size:15px;font-weight:600;margin-bottom:6px;color:#1C1B1F;">¡Ya casi!</div><div style="font-size:13px;color:#5C5C6B;">La alimentación complementaria<br>empieza el <strong>10 de mayo de 2026</strong>.</div></div>`;return;}
  if(n>15){body.innerHTML=`<div class="card" style="text-align:center;padding:28px 16px;color:#5C5C6B;font-size:13px;">¡Excelente trabajo completando los 15 días! 🎉<br>Continúa explorando nuevos alimentos.</div>`;return;}

  const m=getMenu(n);body.innerHTML='';

  // Porcion badge
  const pb=document.createElement('div');
  pb.innerHTML=`<span class="porcion-badge">🍽 Porción Julie: ¼ a ½ taza total en el plato</span>`;
  pb.querySelector('.porcion-badge').style.cssText='display:inline-flex;align-items:center;gap:5px;background:#FDE68A;color:#92400E;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:11px;';
  body.appendChild(pb);

  // Nuevo del día
  const nc=document.createElement('div');
  nc.className=`ncard ${m.a?'nc-a':'nc-n'}`;
  nc.innerHTML=`<div class="nctag ${m.a?'a':'n'}">${m.a?'⚠ Alérgeno — observar 3 días':'Alimento nuevo del día'}</div>
    <div class="ncnom">${m.nuevo}</div>
    <div class="ncnote">${m.nota}</div>
    ${m.a?'<div class="abox">Observar: sarpullido, vómito o diarrea en las 2 horas siguientes. Suspender y consultar al pediatra si hay reacción.</div>':''}`;
  body.appendChild(nc);

  // Plato 5 grupos
  const pc=document.createElement('div');pc.className='card';
  let ph=`<div class="stitle">Plato del día — 5 grupos</div>`;
  GRUPOS_DEF.forEach(g=>{
    const val=m[g.k];
    ph+=`<div class="grow"><span class="gdot ${g.dot}"></span><span class="glbl">${g.lbl}</span><span class="gval">${val||'<span style="color:#A0A0B0;font-size:12px;">Aún no introducido</span>'}</span><button class="gbtn" onclick="openM('${g.k}',${n})">editar</button></div>`;
  });
  pc.innerHTML=ph;body.appendChild(pc);

  // Agua tracker (1 oz por comida = 3 oz aprox según libro 6-8m)
  const todayAguaKey=dk(kd(selK));
  const aguaDone=S.agua[todayAguaKey]||[];
  const aw=document.createElement('div');aw.className='agua-card';
  aw.innerHTML=`<div class="agua-title-row"><div class="stitle" style="margin:0;">💧 Agua del día</div><div class="agua-meta">Meta: 2-3 oz • 1 oz por comida</div></div>
    <div class="agua-vasos" id="agua-vasos"></div>
    <div class="agua-note">Según el libro: 6-8 meses = 2-3 onzas al día, 1 oz después de cada comida</div>`;
  body.appendChild(aw);
  const vasosEl=document.getElementById('agua-vasos');
  ['Desayuno','Comida','Cena'].forEach((lbl,i)=>{
    const done=aguaDone.includes(i);
    const btn=document.createElement('button');
    btn.className='vaso-btn'+(done?' done':'');
    btn.innerHTML=`<span class="vaso-ico">💧</span><span class="vaso-lbl">${lbl}</span>`;
    btn.onclick=()=>{
      const cur=S.agua[todayAguaKey]||[];
      if(cur.includes(i))S.agua[todayAguaKey]=cur.filter(x=>x!==i);
      else S.agua[todayAguaKey]=[...cur,i];
      save();renderHoy();
    };
    vasosEl.appendChild(btn);
  });

  // Horario
  const hc=document.createElement('div');hc.className='card';
  let hh=`<div class="stitle">Rutina del día — para la abuela</div>`;
  HORARIO.forEach(h=>{
    const pc2=h.t==='l'?'hpl':h.t==='c'?'hpc':h.t==='j'?'hpa':'hps';
    const pl=h.t==='l'?'leche':h.t==='c'?'comida':h.t==='j'?'actividad':'siesta';
    hh+=`<div class="hrow"><span class="hhora">${h.h}</span><span class="htxt">${h.txt}</span><span class="hpill ${pc2}">${pl}</span></div>`;
  });
  hc.innerHTML=hh;body.appendChild(hc);

  // Recetas sugeridas
  const recs=RECETAS.filter(r=>r.gs.some(g=>m[g])).slice(0,3);
  if(recs.length){
    const rc=document.createElement('div');rc.className='card';
    let rh=`<div class="stitle">Recetas para hoy</div>`;
    recs.forEach(r=>{
      rh+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F0EEF8;cursor:pointer;" onclick="goRec('${r.id}')">
        <span style="font-size:22px;">${r.e}</span>
        <div style="flex:1;"><div style="font-size:13px;font-weight:500;color:#1C1B1F;">${r.tit}</div><div style="font-size:11px;color:#A0A0B0;margin-top:1px;">${r.sub}</div></div>
        <span style="font-size:14px;color:#DB2777;">›</span>
      </div>`;
    });
    rc.innerHTML=rh;body.appendChild(rc);
  }
}

function goRec(id){
  document.querySelector('[onclick*="recetas"]').click();
  setTimeout(()=>{const el=document.getElementById('rc-'+id);if(el){el.scrollIntoView({behavior:'smooth'});const t=el.querySelector('.rtop');if(t)t.click();}},150);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
let mCtx={};
function openM(grupo,dia){
  mCtx={grupo,dia};
  const labels={c:'Cereal',v:'Verdura',p:'Proteína',f:'Fruta',g:'Grasa'};
  document.getElementById('mtit').textContent='Editar '+labels[grupo];
  const cur=getMenu(dia)[grupo]||'';
  const opts=LIBRO[grupo]?.opts||[];
  const grid=document.getElementById('mopts');grid.innerHTML='';
  opts.forEach(op=>{
    const b=document.createElement('button');
    b.className='mopt'+(cur.includes(op.replace(' ⚠',''))?' sel':'');
    b.textContent=op;b.onclick=()=>b.classList.toggle('sel');
    grid.appendChild(b);
  });
  document.getElementById('modal').classList.add('open');
}
function saveM(){
  const{grupo,dia}=mCtx;
  const sels=[...document.querySelectorAll('#mopts .mopt.sel')].map(b=>b.textContent.replace(' ⚠',''));
  if(!S.overrides[dia])S.overrides[dia]={};
  S.overrides[dia][grupo]=sels.length?sels.join('/'):null;
  save();closeM();renderHoy();
}
function closeM(){document.getElementById('modal').classList.remove('open');}

// ── ALIMENTOS ─────────────────────────────────────────────────────────────
function renderAlimentos(){
  const c=document.getElementById('ali-grupos');c.innerHTML='';
  const dotMap={c:'gc',v:'gv',p:'gp',f:'gf',g:'gg'};
  Object.entries(LIBRO).forEach(([k,gr])=>{
    const sec=document.createElement('div');sec.className='grupo-section';
    let html=`<div class="grupo-hdr"><span class="grupo-hdr-dot gdot ${dotMap[k]}"></span><span class="grupo-hdr-title">${gr.label}</span></div><div class="ali-grid">`;
    gr.opts.forEach(op=>{
      const clean=op.replace(' ⚠','');
      const isA=op.includes('⚠');
      const isSel=!!(S.aliSel[k]&&S.aliSel[k].includes(clean));
      html+=`<div class="ali-chip${isSel?' sc sc-'+k:''}" onclick="togAli('${k}','${clean}',this)">
        <span class="gdot ${dotMap[k]}" style="width:8px;height:8px;flex-shrink:0;"></span>
        <span class="ali-chip-name">${op}</span>
        ${isA?'<span class="adot"></span>':''}
      </div>`;
    });
    html+='</div>';sec.innerHTML=html;c.appendChild(sec);
  });
}
function togAli(g,n,el){
  if(!S.aliSel[g])S.aliSel[g]=[];
  const i=S.aliSel[g].indexOf(n);
  if(i>=0){S.aliSel[g].splice(i,1);el.classList.remove('sc','sc-'+g);}
  else{S.aliSel[g].push(n);el.classList.add('sc','sc-'+g);}
  save();
}
function aprobar(){
  const btn=document.querySelector('.aprobar-btn');
  btn.textContent='✓ Guardado en tu menú';
  btn.style.background='#34D399';
  setTimeout(()=>{btn.textContent='Guardar selección ✓';btn.style.background='';},2500);
  save();
}

// ── RECETAS ───────────────────────────────────────────────────────────────
let recCat='Todas';
function renderRecetas(){
  const catsEl=document.getElementById('rec-cats');catsEl.innerHTML='';
  REC_CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='rcbtn'+(c===recCat?' on':'');
    b.textContent=c;b.onclick=()=>{recCat=c;renderRecetas();};
    catsEl.appendChild(b);
  });
  const list=document.getElementById('rec-list');list.innerHTML='';
  const filtered=RECETAS.filter(r=>recCat==='Todas'||r.cat===recCat);
  if(recCat==='Todas'){
    const bycat={};
    filtered.forEach(r=>{if(!bycat[r.cat])bycat[r.cat]=[];bycat[r.cat].push(r);});
    Object.entries(bycat).forEach(([cat,recs])=>{
      const sec=document.createElement('div');sec.className='cat-sec';
      sec.innerHTML=`<div class="cat-lbl">${cat}</div>`;
      recs.forEach(r=>sec.appendChild(makeRec(r)));
      list.appendChild(sec);
    });
  }else{filtered.forEach(r=>list.appendChild(makeRec(r)));}
}
function makeRec(r){
  const isDone=!!S.recDone[r.id];
  const emoClass=r.a?'re-a':r.emo==='v'?'re-v':r.emo==='c'?'re-c':'re-n';
  const card=document.createElement('div');card.className='rcard';card.id='rc-'+r.id;
  const tags=r.gs.map(g=>`<span class="rtag rt-${g}">${{c:'cereal',v:'verdura',p:'proteína',f:'fruta',g:'grasa'}[g]}</span>`).join('');
  const atag=r.a?'<span class="rtag rt-a">alérgeno ⚠</span>':'';
  card.innerHTML=`<div class="rtop" onclick="togRec('${r.id}')">
    <div class="remo ${emoClass}">${r.e}</div>
    <div class="rinfo"><div class="rtit">${r.tit}</div><div class="rsub">${r.sub}</div><div class="rtags">${tags}${atag}</div></div>
    <span class="rchev" id="rch-${r.id}">▼</span>
  </div>
  <div class="rbody" id="rb-${r.id}">
    <div class="rsec">Ingredientes</div>
    ${r.ings.map(i=>`<div class="ring">${i}</div>`).join('')}
    <div class="rsec">Preparación</div>
    ${r.pasos.map((p,i)=>`<div class="rpaso"><span class="rpn">${i+1}.</span><span class="rpt">${p}</span></div>`).join('')}
    <div class="rnota">${r.nota}</div>
    <button class="rmark ${isDone?'on':'off'}" onclick="togRecDone('${r.id}',event)">${isDone?'✓ Cocinada esta semana':'Marcar como cocinada'}</button>
  </div>`;
  return card;
}
function togRec(id){const b=document.getElementById('rb-'+id);const ch=document.getElementById('rch-'+id);const o=b.classList.toggle('open');ch.classList.toggle('open',o);}
function togRecDone(id,e){e.stopPropagation();S.recDone[id]=!S.recDone[id];save();renderRecetas();}

// ── PROGRESO ──────────────────────────────────────────────────────────────
function renderProgreso(){
  const prob=Object.values(S.prob).filter(Boolean).length;
  const alergs=TRACKER_BASE.filter(t=>t.a&&S.prob[t.n]).length;
  const maxExp=Math.max(0,...Object.values(S.exp).map(Number));
  const diaN=Math.max(1,Math.min(15,diff(new Date())));
  document.getElementById('stats-grid').innerHTML=`
    <div class="sc2 scr"><div class="sc-ico">🥕</div><div class="sc-num">${prob}</div><div class="sc-lbl">Alimentos probados</div></div>
    <div class="sc2 scl"><div class="sc-ico">📅</div><div class="sc-num">${diaN}</div><div class="sc-lbl">Día actual</div></div>
    <div class="sc2 scp"><div class="sc-ico">⚠️</div><div class="sc-num">${alergs}</div><div class="sc-lbl">Alérgenos sin reacción</div></div>
    <div class="sc2 scm"><div class="sc-ico">🔁</div><div class="sc-num">${maxExp}</div><div class="sc-lbl">Máx. exposiciones</div></div>`;
  const dmap={p:'gp',v:'gv',c:'gc',f:'gf',g:'gg'};
  const list=document.getElementById('ali-tracker');list.innerHTML='';
  TRACKER_BASE.forEach(t=>{
    const exp=S.exp[t.n]||0,isP=!!S.prob[t.n];
    const row=document.createElement('div');row.className='alirow';
    let dh='<div class="expdots">';
    for(let i=0;i<9;i++){const done=i<exp;dh+=`<div class="exdot ${done?(t.a?'da':'dn'):''}" onclick="togExp('${t.n}',${i},${t.a})">${done?'✓':''}</div>`;}
    dh+='</div>';
    row.innerHTML=`<span class="alidot gdot ${dmap[t.g]}"></span>
      <div class="aliinfo">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"><span class="aliname">${t.n}</span>${t.a?'<span class="abadge">alérgeno</span>':''}</div>
        <div class="alicnt">${exp}/9 exposiciones</div>${dh}
      </div>
      <button class="mkbtn ${isP?'on':'off'}" onclick="togProb('${t.n}')">${isP?'✓ probada':'marcar'}</button>`;
    list.appendChild(row);
  });
}
function togExp(n,i,isA){const c=S.exp[n]||0;S.exp[n]=i+1===c?c-1:i+1;if(S.exp[n]>0)S.prob[n]=true;save();renderProgreso();}
function togProb(n){S.prob[n]=!S.prob[n];if(S.prob[n]&&!S.exp[n])S.exp[n]=1;save();renderProgreso();}

// ── COMPRAS ───────────────────────────────────────────────────────────────
function renderCompras(){
  let total=0,done=0;
  const body=document.getElementById('compras-body');body.innerHTML='';
  COMPRAS_DATA.forEach(cat=>{
    const lbl=document.createElement('div');lbl.className='clbl';lbl.textContent=cat.cat;body.appendChild(lbl);
    const card=document.createElement('div');card.className='card';card.style.padding='8px 14px';
    cat.items.forEach(item=>{
      total++;const k=cat.cat+'::'+item;const isDone=!!S.compDone[k];if(isDone)done++;
      const row=document.createElement('div');row.className='crow';
      row.innerHTML=`<div class="chk ${isDone?'on':''}">${isDone?'✓':''}</div><span class="ctxt ${isDone?'done':''}">${item}</span>`;
      row.onclick=()=>{S.compDone[k]=!S.compDone[k];save();renderCompras();};
      card.appendChild(row);
    });
    body.appendChild(card);
  });
  document.getElementById('pbar').style.width=Math.round(done/total*100)+'%';
}
function resetC(){S.compDone={};save();renderCompras();}

// ── INIT ──────────────────────────────────────────────────────────────────
load();
if(!S.selDate)S.selDate=dk(new Date());
renderHoy();
</script>
</body>
