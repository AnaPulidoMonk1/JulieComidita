<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Julie comiditas">
<meta name="color-scheme" content="light">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23FDF2F8'/%3E%3Ccircle cx='90' cy='75' r='18' fill='%23F472B6'/%3E%3Ccircle cx='90' cy='45' r='14' fill='%23F9A8D4'/%3E%3Ccircle cx='90' cy='105' r='14' fill='%23F9A8D4'/%3E%3Ccircle cx='62' cy='60' r='14' fill='%23F9A8D4'/%3E%3Ccircle cx='118' cy='60' r='14' fill='%23F9A8D4'/%3E%3Ccircle cx='62' cy='90' r='14' fill='%23F9A8D4'/%3E%3Ccircle cx='118' cy='90' r='14' fill='%23F9A8D4'/%3E%3Ccircle cx='90' cy='75' r='10' fill='%23FEF3C7'/%3E%3Ctext x='90' y='145' font-size='38' text-anchor='middle' font-family='serif'%3E🍽%3C/text%3E%3C/svg%3E">
<title>Julie comiditas 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light only;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#fff!important;font-family:'DM Sans',-apple-system,sans-serif;color:#1C1B1F!important;overflow:hidden;}
:root{
  --r:#F472B6;--rd:#DB2777;--rl:#FDF2F8;--rm:#FBCFE8;
  --l:#A78BFA;--ll:#F5F3FF;--lm:#EDE9FE;
  --m:#34D399;--ml:#ECFDF5;--mm:#D1FAE5;
  --p:#FB923C;--pl:#FFF7ED;--pm:#FED7AA;
  --s:#38BDF8;--sl:#F0F9FF;--sm:#BAE6FD;
  --a:#FBBF24;--al:#FFFBEB;--am:#FDE68A;
  --bg:#F8F6FF;--w:#fff;--b1:#F0EEF8;--b2:#E5E2F5;
  --t1:#1C1B1F;--t2:#5C5C6B;--t3:#A0A0B0;
}
.app{max-width:393px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);}
.topbar{background:#fff!important;border-bottom:1.5px solid var(--b1);padding:env(safe-area-inset-top,44px) 18px 0;flex-shrink:0;}
.topbar-inner{padding:10px 0 11px;display:flex;align-items:center;justify-content:space-between;}
.logo-row{display:flex;align-items:center;gap:9px;}
.logo-box{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#FBCFE8,#EDE9FE);display:flex;align-items:center;justify-content:center;font-size:19px;}
.app-name{font-family:'DM Serif Display',serif;font-size:19px;color:var(--t1)!important;}
.day-chip{background:var(--rm);color:var(--rd);font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:14px 14px 32px;}
.page.on{display:block;}
.nav{background:#fff!important;border-top:1.5px solid var(--b1);padding:5px 0 env(safe-area-inset-bottom,14px);display:flex;flex-shrink:0;}
.nb{flex:1;padding:6px 2px 4px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:12px;font-size:10px;font-weight:500;font-family:inherit;color:var(--t3);transition:all .2s;}
.nb.on{color:var(--rd);background:var(--rl);}
.nb-i{font-size:20px;line-height:1;}
.card{background:#fff!important;border-radius:20px;padding:14px;margin-bottom:11px;border:1.5px solid var(--b1);}
.stitle{font-size:10px;font-weight:700;color:var(--t3)!important;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}

/* CALENDAR */
.wknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.wklbl{font-family:'DM Serif Display',serif;font-size:16px;color:var(--t1)!important;}
.wkarr{width:32px;height:32px;border-radius:10px;background:var(--rl);border:none;color:var(--rd);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.daygrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:12px;}
.dcell{display:flex;flex-direction:column;align-items:center;padding:5px 1px 3px;border-radius:10px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.dcell .dn{font-size:9px;font-weight:700;color:var(--t3)!important;text-transform:uppercase;}
.dcell .dd{font-size:14px;font-weight:500;color:var(--t1)!important;margin-top:1px;}
.dcell .ddot{width:5px;height:5px;border-radius:50%;background:var(--a);margin-top:2px;visibility:hidden;}
.dcell.food .ddot{visibility:visible;}
.dcell.done-day .ddot{background:var(--m);}
.dcell.today{border-color:var(--rm);}
.dcell.sel{background:var(--rd)!important;border-color:var(--rd);}
.dcell.sel .dn,.dcell.sel .dd{color:#fff!important;}

/* NUEVO */
.ncard{border-radius:20px;padding:16px;margin-bottom:11px;}
.nc-n{background:linear-gradient(135deg,#FDF2F8,#F5F3FF);}
.nc-a{background:linear-gradient(135deg,#FFF1F2,#FEE2E2);}
.nctag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px;}
.nctag.n{color:var(--rd);}
.nctag.a{color:#DC2626;}
.ncnom{font-family:'DM Serif Display',serif;font-size:22px;color:var(--t1)!important;margin-bottom:4px;line-height:1.2;}
.ncnote{font-size:13px;color:var(--t2)!important;line-height:1.5;}
.abox{margin-top:8px;background:rgba(254,226,226,.85);border-radius:10px;padding:8px 11px;font-size:12px;color:#991B1B;line-height:1.4;}

/* COMIDAS DEL DIA */
.comida-block{border:1.5px solid var(--b1);border-radius:16px;margin-bottom:10px;overflow:hidden;}
.comida-header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg);cursor:pointer;}
.comida-hora{font-size:12px;font-weight:600;color:var(--t2)!important;}
.comida-nombre{font-size:14px;font-weight:600;color:var(--t1)!important;flex:1;margin-left:8px;}
.comida-done-btn{font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;transition:all .2s;}
.cdb-off{background:var(--rl);color:var(--rd);}
.cdb-on{background:var(--mm);color:#065F46;}
.comida-body{padding:0 13px 12px;display:none;}
.comida-body.open{display:block;}
.grupo-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--b1);}
.grupo-row:last-child{border:none;}
.gdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.gc{background:#FBBF24;}.gv{background:#34D399;}.gp{background:#F87171;}.gf{background:#38BDF8;}.gg{background:#A78BFA;}
.glbl{font-size:11px;font-weight:500;color:var(--t3)!important;width:56px;flex-shrink:0;}
.gval{font-size:13px;color:var(--t1)!important;flex:1;line-height:1.3;}
.gbtn{font-size:11px;font-weight:600;color:var(--rd);background:var(--rl);border:none;border-radius:8px;padding:4px 9px;cursor:pointer;flex-shrink:0;font-family:inherit;}
.add-rec-btn{font-size:12px;color:var(--rd);background:var(--rl);border:none;border-radius:10px;padding:6px 12px;cursor:pointer;font-family:inherit;font-weight:500;margin-top:8px;width:100%;}
.add-compras-btn{font-size:12px;color:#065F46;background:var(--mm);border:none;border-radius:10px;padding:6px 12px;cursor:pointer;font-family:inherit;font-weight:500;margin-top:6px;width:100%;}

/* REGISTRO */
.reg-form{background:var(--rl);border-radius:14px;padding:12px;margin-top:8px;}
.reg-row{display:flex;gap:6px;margin-bottom:6px;}
.reg-input{flex:1;padding:8px 10px;border-radius:10px;border:1.5px solid var(--rm);font-size:13px;font-family:inherit;background:#fff;color:var(--t1);}
.reg-input::placeholder{color:var(--t3);}
.reg-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.reg-act-btn{font-size:11px;font-weight:600;padding:6px 11px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-fav{background:var(--al);color:#92400E;}
.btn-despues{background:var(--lm);color:#5B21B6;}
.btn-reac{background:#FEE2E2;color:#991B1B;}
.btn-guardar{background:var(--rd);color:#fff;margin-left:auto;}

/* AGUA */
.agua-card{background:#fff!important;border-radius:20px;padding:14px;margin-bottom:11px;border:1.5px solid var(--b1);}
.agua-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.agua-meta{font-size:12px;color:var(--t2)!important;}
.agua-vasos{display:flex;gap:10px;justify-content:center;padding:4px 0;}
.vaso-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;font-family:inherit;}
.vaso-ico{font-size:26px;filter:grayscale(1) opacity(.3);transition:all .2s;}
.vaso-btn.done .vaso-ico{filter:none;}
.vaso-lbl{font-size:10px;font-weight:500;color:var(--t3)!important;}
.vaso-btn.done .vaso-lbl{color:var(--s)!important;}

/* PORCION */
.porcion-pill{display:inline-flex;align-items:center;gap:5px;background:var(--am);color:#92400E;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:10px;}

/* HORARIO */
.hrow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--b1);}
.hrow:last-child{border:none;}
.hhora{font-size:11px;font-weight:600;color:var(--t2)!important;width:42px;flex-shrink:0;}
.htxt{font-size:12px;color:var(--t1)!important;flex:1;line-height:1.3;}
.hpill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.hpl{background:#DBEAFE;color:#1D4ED8;}.hpc{background:var(--mm);color:#065F46;}.hps{background:var(--lm);color:#5B21B6;}.hpj{background:var(--am);color:#92400E;}

/* ALIMENTOS */
.ali-hint{font-size:12px;color:var(--t2)!important;margin-bottom:12px;padding:10px 12px;background:var(--rl);border-radius:12px;line-height:1.5;}
.grupo-section{margin-bottom:15px;}
.grupo-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ali-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;}
.ali-chip{padding:9px 11px;border-radius:12px;border:1.5px solid var(--b1);background:#fff!important;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;}
.ali-chip.sc{border-width:2px;}
.sc-c{border-color:#FBBF24;background:var(--al)!important;}
.sc-v{border-color:#34D399;background:var(--ml)!important;}
.sc-p{border-color:#F87171;background:#FFF1F2!important;}
.sc-f{border-color:#38BDF8;background:var(--sl)!important;}
.sc-g{border-color:#A78BFA;background:var(--ll)!important;}
.ali-chip-name{font-size:12px;font-weight:500;color:var(--t1)!important;flex:1;line-height:1.3;}
.adot-r{width:6px;height:6px;border-radius:50%;background:#F87171;margin-left:auto;flex-shrink:0;}
.aprobar-btn{width:100%;padding:12px;background:var(--rd);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}

/* RECETAS */
.rec-cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:11px;scrollbar-width:none;}
.rec-cats::-webkit-scrollbar{display:none;}
.rcbtn{font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:1.5px solid var(--b1);background:#fff!important;cursor:pointer;font-family:inherit;color:var(--t2);white-space:nowrap;flex-shrink:0;transition:all .15s;}
.rcbtn.on{background:var(--rd)!important;border-color:var(--rd);color:#fff;}
.rcard{background:#fff!important;border-radius:18px;border:1.5px solid var(--b1);margin-bottom:9px;overflow:hidden;}
.rtop{padding:12px;display:flex;gap:10px;cursor:pointer;align-items:flex-start;}
.remo{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.re-n{background:linear-gradient(135deg,var(--rl),var(--ll));}
.re-a{background:linear-gradient(135deg,#FFF1F2,#FFE4E6);}
.re-v{background:linear-gradient(135deg,var(--ml),var(--sl));}
.re-c{background:linear-gradient(135deg,var(--al),var(--pl));}
.rinfo{flex:1;min-width:0;}
.rtit{font-size:14px;font-weight:600;color:var(--t1)!important;margin-bottom:2px;}
.rsub{font-size:11px;color:var(--t2)!important;}
.rtags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.rtag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.rt-c{background:var(--al);color:#92400E;}.rt-v{background:var(--ml);color:#065F46;}
.rt-p{background:#FFF1F2;color:#9F1239;}.rt-f{background:var(--sl);color:#0C4A6E;}
.rt-g{background:var(--ll);color:#4C1D95;}.rt-a{background:#FEE2E2;color:#991B1B;}
.rchev{font-size:12px;color:var(--t3);flex-shrink:0;margin-top:2px;transition:transform .2s;}
.rchev.open{transform:rotate(180deg);}
.rbody{display:none;padding:0 12px 12px;}
.rbody.open{display:block;}
.rsec{font-size:10px;font-weight:700;color:var(--t3)!important;text-transform:uppercase;letter-spacing:.07em;margin:9px 0 5px;}
.ring{font-size:13px;color:var(--t2)!important;padding:2px 0;line-height:1.5;}
.ring::before{content:"· ";}
.rpaso{display:flex;gap:7px;padding:3px 0;}
.rpn{font-size:13px;font-weight:700;color:var(--rd);flex-shrink:0;}
.rpt{font-size:13px;color:var(--t1)!important;line-height:1.5;}
.rnota{margin-top:8px;background:var(--rl);border-radius:10px;padding:9px 11px;font-size:12px;color:var(--rd);font-style:italic;line-height:1.4;}
.rbtns{display:flex;gap:6px;margin-top:10px;}
.rmark{flex:1;padding:10px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.rmark.off{background:var(--rd);color:#fff;}
.rmark.on{background:var(--mm);color:#065F46;}
.radd{padding:10px 12px;background:var(--mm);color:#065F46;border:none;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.cat-sec{margin-bottom:6px;}
.cat-lbl{font-size:13px;font-weight:600;color:var(--t1)!important;margin-bottom:8px;padding-left:2px;}

/* PROGRESO */
.stats-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.sc2{border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:3px;}
.scr{background:linear-gradient(135deg,var(--rl),var(--rm));}
.scl{background:linear-gradient(135deg,var(--ll),var(--lm));}
.scm{background:linear-gradient(135deg,var(--ml),var(--mm));}
.scp{background:linear-gradient(135deg,var(--pl),var(--pm));}
.sc-ico{font-size:20px;}
.sc-num{font-family:'DM Serif Display',serif;font-size:28px;color:var(--t1)!important;line-height:1;}
.sc-lbl{font-size:11px;font-weight:500;color:var(--t2)!important;}
.alirow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--b1);}
.alirow:last-child{border:none;}
.alidot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.aliinfo{flex:1;min-width:0;}
.aliname{font-size:13px;font-weight:500;color:var(--t1)!important;}
.alicnt{font-size:11px;color:var(--t3)!important;margin-top:1px;}
.expdots{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.exdot{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--b2);background:#fff!important;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.exdot.dn{background:var(--r)!important;border-color:var(--rd);color:#fff;}
.exdot.da{background:#FCA5A5!important;border-color:#EF4444;color:#fff;}
.mkbtn{font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;flex-shrink:0;}
.mkbtn.off{background:var(--rl);color:var(--rd);}
.mkbtn.on{background:var(--mm);color:#065F46;}
.abadge{font-size:9px;background:#FEE2E2;color:#991B1B;padding:1px 6px;border-radius:20px;font-weight:700;}

/* COMPRAS */
.chead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.chead-t{font-family:'DM Serif Display',serif;font-size:20px;color:var(--t1)!important;}
.rst{font-size:12px;color:var(--rd);background:none;border:none;cursor:pointer;font-family:inherit;}
.pbarw{height:6px;background:var(--b1);border-radius:6px;overflow:hidden;margin-bottom:13px;}
.pbar{height:100%;background:linear-gradient(90deg,var(--r),var(--l));border-radius:6px;transition:width .4s;}
.clbl{font-size:10px;font-weight:700;color:var(--t3)!important;text-transform:uppercase;letter-spacing:.07em;margin:12px 0 6px;}
.crow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--b1);cursor:pointer;}
.crow:last-child{border:none;}
.chk{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
.chk.on{background:var(--rd);border-color:var(--rd);color:#fff;}
.ctxt{font-size:13px;color:var(--t1)!important;flex:1;line-height:1.3;}
.ctxt.done{text-decoration:line-through;color:var(--t3)!important;}
.cdel{font-size:14px;color:var(--t3);background:none;border:none;cursor:pointer;padding:0 4px;}

/* MODAL editar grupo */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.mov.open{display:flex;}
.msh{background:#fff!important;border-radius:26px 26px 0 0;width:100%;max-width:393px;max-height:80dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,20px);animation:sup .3s cubic-bezier(.4,0,.2,1);}
@keyframes sup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mhdl{width:36px;height:4px;background:var(--b1);border-radius:4px;margin:12px auto 13px;}
.mhd{padding:0 20px 11px;border-bottom:1px solid var(--b1);}
.mtit{font-family:'DM Serif Display',serif;font-size:19px;color:var(--t1)!important;margin-bottom:2px;}
.msub{font-size:13px;color:var(--t2)!important;}
.mopts{flex:1;overflow-y:auto;padding:12px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;}
.mopt{padding:10px 11px;border-radius:11px;border:1.5px solid var(--b1);background:#fff!important;font-size:13px;cursor:pointer;text-align:left;font-family:inherit;color:var(--t1);transition:all .15s;line-height:1.4;}
.mopt.sel{border-color:var(--rd);background:var(--rl)!important;color:var(--rd);font-weight:600;}
.macts{padding:11px 20px 0;display:flex;gap:8px;}
.msave{flex:1;padding:12px;background:var(--rd);color:#fff;border:none;border-radius:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.mcancel{padding:12px 15px;background:#fff!important;color:var(--t2);border:1.5px solid var(--b1);border-radius:13px;font-size:14px;cursor:pointer;font-family:inherit;}

/* CONFIRM MODAL */
.conf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:20px;}
.conf-overlay.open{display:flex;}
.conf-box{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:320px;text-align:center;}
.conf-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:8px;color:var(--t1);}
.conf-msg{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5;}
.conf-btns{display:flex;gap:8px;}
.conf-cancel{flex:1;padding:11px;background:var(--b1);color:var(--t2);border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.conf-ok{flex:1;padding:11px;background:#EF4444;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo-row">
      <div class="logo-box">🌸</div>
      <span class="app-name">Julie comiditas</span>
    </div>
    <span class="day-chip" id="day-chip">Día 1</span>
  </div>

// ── HELPERS ────────────────────────────────────────────────────────────────
function dk(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function kd(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function diff(d){return Math.floor((new Date(d.getFullYear(),d.getMonth(),d.getDate())-START)/86400000)+1;}
function getWeekDays(){
  const t=new Date();t.setHours(0,0,0,0);
  const sun=new Date(t);sun.setDate(t.getDate()-t.getDay()+(S.weekOff*7));
  return Array.from({length:7},(_,i)=>{const d=new Date(sun);d.setDate(sun.getDate()+i);return d;});
}
function getMenuDay(n){
  if(n>=1&&n<=15) return {...MENU_BASE[n-1],...(S.overrides[n]||{})};
  // Beyond day 15 — return template with 5 groups from selections or empty
  return {d:n,nuevo:null,a:false,nota:'',c:null,v:null,p:null,f:null,g:null,...(S.overrides[n]||{})};
}

function nav(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='alimentos')renderAlimentos();
  if(name==='recetas')renderRecetas();
  if(name==='progreso')renderProgreso();
  if(name==='compras')renderCompras();
}

// ── HOY ────────────────────────────────────────────────────────────────────
function prevW(){S.weekOff--;save();renderHoy();}
function nextW(){S.weekOff++;save();renderHoy();}

function renderHoy(){
  const days=getWeekDays();
  const f=days[0],l=days[6];
  document.getElementById('wklbl').textContent=`${f.getDate()} ${MESES[f.getMonth()]} – ${l.getDate()} ${MESES[l.getMonth()]}`;
  const todayK=dk(new Date()),selK=S.selDate||todayK;
  const grid=document.getElementById('daygrid');grid.innerHTML='';
  days.forEach(d=>{
    const k=dk(d),n=diff(d);
    const doneArr=S.comidaDone[k]||[];
    const etapa=getEtapa(Math.max(1,n));
    const allDone=doneArr.length>=etapa.comidas;
    const el=document.createElement('div');
    el.className='dcell'+(k===todayK?' today':'')+(k===selK?' sel':'')+(n>=1?' food':'')+(allDone?' done-day':'');
    el.innerHTML=`<span class="dn">${DIAS[d.getDay()]}</span><span class="dd">${d.getDate()}</span><span class="ddot"></span>`;
    el.onclick=()=>{S.selDate=k;save();renderHoy();};
    grid.appendChild(el);
  });
  const selDate=kd(selK);
  const n=diff(selDate);
  document.getElementById('day-chip').textContent=n>=1?'Día '+n:'—';
  renderDayBody(selK,n);
}

function toggleComida(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}
function toggleComidaDone(dateKey,ci){
  if(!S.comidaDone[dateKey])S.comidaDone[dateKey]=[];
  const arr=S.comidaDone[dateKey];
  const idx=arr.indexOf(ci);
  if(idx>=0){
    const nombre=COMIDA_NAMES[ci]||'esta comida';
    confirmAction('¿Desmarcar '+nombre+'?','Se quitará la marca de comida completada.',()=>{
      arr.splice(idx,1);
      save();renderHoy();
    });
  } else {
    arr.push(ci);
    save();renderHoy();
  }
}

function showRegForm(dateKey,ci){
  const regKey=`${dateKey}_${ci}`;
  // Create inline form
  const existing=document.getElementById('regform-'+regKey);
  if(existing){existing.remove();return;}
  const form=document.createElement('div');form.className='reg-form';form.id='regform-'+regKey;
  form.innerHTML=`
    <div class="reg-row">
      <input class="reg-input" id="ri-ali-${regKey}" placeholder="Alimento (ej: Papilla de res)">
    </div>
    <div class="reg-row">
      <input class="reg-input" id="ri-nota-${regKey}" placeholder="Nota (ej: Le gustó mucho)">
    </div>
    <div class="reg-actions">
      <button class="reg-act-btn btn-fav" onclick="saveReg('${regKey}','fav')">⭐ Favorito</button>
      <button class="reg-act-btn btn-despues" onclick="saveReg('${regKey}','despues')">🔄 Probar después</button>
      <button class="reg-act-btn btn-reac" onclick="saveReg('${regKey}','reaccion')">⚠️ Reacción</button>
      <button class="reg-act-btn btn-guardar" onclick="saveReg('${regKey}','ok')">Guardar</button>
    </div>`;
  // Insert after the add button
  const addBtn=document.querySelector(`[onclick="showRegForm('${dateKey}',${ci})"]`);
  if(addBtn)addBtn.parentNode.insertBefore(form,addBtn.nextSibling);
}

function saveReg(regKey,tipo){
  const ali=document.getElementById('ri-ali-'+regKey)?.value?.trim()||'';
  const nota=document.getElementById('ri-nota-'+regKey)?.value?.trim()||'';
  if(!ali)return;
  if(!S.registro[regKey])S.registro[regKey]=[];
  S.registro[regKey].push({
    alimento:ali, nota,
    fav:tipo==='fav',
    despues:tipo==='despues',
    reaccion:tipo==='reaccion',
    ts:Date.now()
  });
  save();renderHoy();
}

function delReg(regKey,idx){
  confirmAction('¿Eliminar este registro?','Esta acción no se puede deshacer.',()=>{
    S.registro[regKey].splice(idx,1);
    save();renderHoy();
  });
}

function addMenuToCompras(dNum,ci){
  const m=getMenuDay(dNum);
  const items=[];
  GRUPOS_DEF.forEach(g=>{if(m[g.k])items.push(m[g.k]);});
  let added=0;
  items.forEach(item=>{
    const k='menu::'+item;
    if(!S.compDone[k]){
      // Add to extra if not in base
      if(!S.compExtra)S.compExtra=[];
      if(!S.compExtra.includes(item)){S.compExtra.push(item);added++;}
    }
  });
  save();
  const btn=event.target;
  btn.textContent='✓ Añadido a compras';
  btn.style.background='var(--rm)';
  btn.style.color='var(--rd)';
  setTimeout(()=>{btn.textContent='🛒 Añadir a compras';btn.style.background='';btn.style.color='';},2000);
}

function goRec(id){
  document.querySelector('[onclick*="recetas"]').click();
  setTimeout(()=>{const el=document.getElementById('rc-'+id);if(el){el.scrollIntoView({behavior:'smooth'});el.querySelector('.rtop').click();}},150);
}

// ── MODAL editar grupo ─────────────────────────────────────────────────────
let mCtx={};
function openM(grupo,dNum,ci){
  mCtx={grupo,dNum,ci};
  const labels={c:'Cereal',v:'Verdura',p:'Proteína',f:'Fruta',g:'Grasa'};
  document.getElementById('mtit').textContent='Editar '+labels[grupo];
  const cur=(S.menuExtra[S.selDate]&&S.menuExtra[S.selDate][ci]&&S.menuExtra[S.selDate][ci][grupo])||getMenuDay(dNum)[grupo]||'';
  const opts=LIBRO[grupo]?.opts||[];
  const grid=document.getElementById('mopts');grid.innerHTML='';
  opts.forEach(op=>{
    const b=document.createElement('button');
    b.className='mopt'+(cur.includes(op.replace(' ⚠',''))?' sel':'');
    b.textContent=op;b.onclick=()=>b.classList.toggle('sel');
    grid.appendChild(b);
  });
  document.getElementById('modal').classList.add('open');
}
function saveM(){
  const{grupo,dNum,ci}=mCtx;
  const sels=[...document.querySelectorAll('#mopts .mopt.sel')].map(b=>b.textContent.replace(' ⚠',''));
  const val=sels.length?sels.join('/'):null;
  const dateKey=S.selDate;
  if(!S.menuExtra[dateKey])S.menuExtra[dateKey]={};
  if(!S.menuExtra[dateKey][ci])S.menuExtra[dateKey][ci]={};
  S.menuExtra[dateKey][ci][grupo]=val;
  // Also save to overrides for the day number
  if(!S.overrides[dNum])S.overrides[dNum]={};
  S.overrides[dNum][grupo]=val;
  save();closeM();renderHoy();
}
function closeM(){document.getElementById('modal').classList.remove('open');}

// ── CONFIRM ────────────────────────────────────────────────────────────────
let confCb=null;
function confirmAction(title,msg,cb){
  document.getElementById('conf-title').textContent=title;
  document.getElementById('conf-msg').textContent=msg;
  confCb=cb;
  document.getElementById('conf-overlay').classList.add('open');
  document.getElementById('conf-ok').onclick=()=>{closeConf();if(confCb)confCb();};
}
function closeConf(){document.getElementById('conf-overlay').classList.remove('open');}

// ── ALIMENTOS ──────────────────────────────────────────────────────────────
function renderAlimentos(){
  const c=document.getElementById('ali-grupos');c.innerHTML='';
  const dmap={c:'gc',v:'gv',p:'gp',f:'gf',g:'gg'};
  Object.entries(LIBRO).forEach(([k,gr])=>{
    const sec=document.createElement('div');sec.className='grupo-section';
    let html=`<div class="grupo-hdr"><span class="gdot ${dmap[k]}" style="width:12px;height:12px;border-radius:50%;flex-shrink:0;"></span><span style="font-size:14px;font-weight:600;color:var(--t1);margin-left:6px;">${gr.label}</span></div><div class="ali-grid">`;
    gr.opts.forEach(op=>{
      const clean=op.replace(' ⚠','');
      const isA=op.includes('⚠');
      const isSel=!!(S.aliSel[k]&&S.aliSel[k].includes(clean));
      html+=`<div class="ali-chip${isSel?' sc sc-'+k:''}" onclick="togAli('${k}','${clean}',this)">
        <span class="gdot ${dmap[k]}" style="width:8px;height:8px;flex-shrink:0;"></span>
        <span class="ali-chip-name">${op}</span>
        ${isA?'<span class="adot-r"></span>':''}
      </div>`;
    });
    html+='</div>';sec.innerHTML=html;c.appendChild(sec);
  });
}
function togAli(g,n,el){
  if(!S.aliSel[g])S.aliSel[g]=[];
  const i=S.aliSel[g].indexOf(n);
  if(i>=0){S.aliSel[g].splice(i,1);el.classList.remove('sc','sc-'+g);}
  else{S.aliSel[g].push(n);el.classList.add('sc','sc-'+g);}
  save();
}
function aprobar(){
  const btn=document.querySelector('.aprobar-btn');
  btn.textContent='✓ Guardado en tu menú';btn.style.background='#34D399';
  setTimeout(()=>{btn.textContent='Guardar selección ✓';btn.style.background='';},2500);
  save();
}

// ── RECETAS ────────────────────────────────────────────────────────────────
let recCat='Todas';
function renderRecetas(){
  const catsEl=document.getElementById('rec-cats');catsEl.innerHTML='';
  REC_CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='rcbtn'+(c===recCat?' on':'');
    b.textContent=c;b.onclick=()=>{recCat=c;renderRecetas();};
    catsEl.appendChild(b);
  });
  const list=document.getElementById('rec-list');list.innerHTML='';
  const filtered=RECETAS.filter(r=>recCat==='Todas'||r.cat===recCat);
  if(recCat==='Todas'){
    const bycat={};
    filtered.forEach(r=>{if(!bycat[r.cat])bycat[r.cat]=[];bycat[r.cat].push(r);});
    Object.entries(bycat).forEach(([cat,recs])=>{
      const sec=document.createElement('div');sec.className='cat-sec';
      sec.innerHTML=`<div class="cat-lbl">${cat}</div>`;
      recs.forEach(r=>sec.appendChild(makeRec(r)));
      list.appendChild(sec);
    });
  }else{filtered.forEach(r=>list.appendChild(makeRec(r)));}
}
function makeRec(r){
  const isDone=!!S.recDone[r.id];
  const emoClass=r.a?'re-a':r.emo==='v'?'re-v':r.emo==='c'?'re-c':'re-n';
  const card=document.createElement('div');card.className='rcard';card.id='rc-'+r.id;
  const tags=r.gs.map(g=>`<span class="rtag rt-${g}">${{c:'cereal',v:'verdura',p:'proteína',f:'fruta',g:'grasa'}[g]}</span>`).join('');
  const atag=r.a?'<span class="rtag rt-a">alérgeno ⚠</span>':'';
  card.innerHTML=`<div class="rtop" onclick="togRec('${r.id}')">
    <div class="remo ${emoClass}">${r.e}</div>
    <div class="rinfo"><div class="rtit">${r.tit}</div><div class="rsub">${r.sub}</div><div class="rtags">${tags}${atag}</div></div>
    <span class="rchev" id="rch-${r.id}">▼</span>
  </div>
  <div class="rbody" id="rb-${r.id}">
    <div class="rsec">Ingredientes</div>${r.ings.map(i=>`<div class="ring">${i}</div>`).join('')}
    <div class="rsec">Preparación</div>${r.pasos.map((p,i)=>`<div class="rpaso"><span class="rpn">${i+1}.</span><span class="rpt">${p}</span></div>`).join('')}
    <div class="rnota">${r.nota}</div>
    <div class="rbtns">
      <button class="rmark ${isDone?'on':'off'}" onclick="togRecDone('${r.id}',event)">${isDone?'✓ Cocinada':'Marcar como cocinada'}</button>
      <button class="radd" onclick="addRecToCompras('${r.id}',event)">🛒 Añadir</button>
    </div>
  </div>`;
  return card;
}
function togRec(id){const b=document.getElementById('rb-'+id);const ch=document.getElementById('rch-'+id);const o=b.classList.toggle('open');ch.classList.toggle('open',o);}
function togRecDone(id,e){e.stopPropagation();S.recDone[id]=!S.recDone[id];save();renderRecetas();}
function addRecToCompras(id,e){
  e.stopPropagation();
  const r=RECETAS.find(x=>x.id===id);
  if(!r)return;
  if(!S.compExtra)S.compExtra=[];
  r.ings.forEach(ing=>{if(!S.compExtra.includes(ing))S.compExtra.push(ing);});
  save();
  const btn=e.target;
  btn.textContent='✓ Añadido';btn.style.background='var(--rm)';btn.style.color='var(--rd)';
  setTimeout(()=>{btn.textContent='🛒 Añadir';btn.style.background='';btn.style.color='';},2000);
}

// ── PROGRESO ───────────────────────────────────────────────────────────────
function renderProgreso(){
  const prob=Object.values(S.prob).filter(Boolean).length;
  const alergs=TRACKER_BASE.filter(t=>t.a&&S.prob[t.n]).length;
  const maxExp=Math.max(0,...Object.values(S.exp).map(Number));
  const diaN=Math.max(1,diff(new Date()));
  document.getElementById('stats-grid').innerHTML=`
    <div class="sc2 scr"><div class="sc-ico">🥕</div><div class="sc-num">${prob}</div><div class="sc-lbl">Alimentos probados</div></div>
    <div class="sc2 scl"><div class="sc-ico">📅</div><div class="sc-num">${diaN}</div><div class="sc-lbl">Día actual</div></div>
    <div class="sc2 scp"><div class="sc-ico">⚠️</div><div class="sc-num">${alergs}</div><div class="sc-lbl">Alérgenos ok</div></div>
    <div class="sc2 scm"><div class="sc-ico">🔁</div><div class="sc-num">${maxExp}</div><div class="sc-lbl">Máx. exposiciones</div></div>`;
  const dmap={p:'gp',v:'gv',c:'gc',f:'gf',g:'gg'};
  const list=document.getElementById('ali-tracker');list.innerHTML='';
  TRACKER_BASE.forEach(t=>{
    const exp=S.exp[t.n]||0,isP=!!S.prob[t.n];
    const row=document.createElement('div');row.className='alirow';
    let dh='<div class="expdots">';
    for(let i=0;i<9;i++){const done=i<exp;dh+=`<div class="exdot ${done?(t.a?'da':'dn'):''}" onclick="togExp('${t.n}',${i})">${done?'✓':''}</div>`;}
    dh+='</div>';
    row.innerHTML=`<span class="alidot gdot ${dmap[t.g]}"></span>
      <div class="aliinfo">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"><span class="aliname">${t.n}</span>${t.a?'<span class="abadge">alérgeno</span>':''}</div>
        <div class="alicnt">${exp}/9 exposiciones</div>${dh}
      </div>
      <button class="mkbtn ${isP?'on':'off'}" onclick="togProb('${t.n}')">${isP?'✓ probada':'marcar'}</button>`;
    list.appendChild(row);
  });
}
function togExp(n,i){
  const c=S.exp[n]||0;
  const removing = (i+1===c);
  if(removing){
    confirmAction('¿Quitar esta exposición?','Se reducirá el contador de '+n+' en 1.',()=>{
      S.exp[n]=c-1;
      if(S.exp[n]<=0)S.prob[n]=false;
      save();renderProgreso();
    });
  } else {
    S.exp[n]=i+1;
    if(S.exp[n]>0)S.prob[n]=true;
    save();renderProgreso();
  }
}
function togProb(n){
  if(S.prob[n]){
    confirmAction('¿Quitar "probada" de '+n+'?','Se marcará como no probada.',()=>{
      S.prob[n]=false;
      save();renderProgreso();
    });
  } else {
    S.prob[n]=true;
    if(!S.exp[n])S.exp[n]=1;
    save();renderProgreso();
  }
}

// ── COMPRAS ────────────────────────────────────────────────────────────────
function renderCompras(){
  let total=0,done=0;
  const body=document.getElementById('compras-body');body.innerHTML='';
  COMPRAS_BASE.forEach(cat=>{
    const lbl=document.createElement('div');lbl.className='clbl';lbl.textContent=cat.cat;body.appendChild(lbl);
    const card=document.createElement('div');card.className='card';card.style.padding='8px 13px';
    cat.items.forEach(item=>{
      total++;const k='base::'+item;const isDone=!!S.compDone[k];if(isDone)done++;
      const row=document.createElement('div');row.className='crow';
      row.innerHTML=`<div class="chk ${isDone?'on':''}">${isDone?'✓':''}</div><span class="ctxt ${isDone?'done':''}">${item}</span>`;
      row.onclick=()=>{S.compDone[k]=!S.compDone[k];save();renderCompras();};
      card.appendChild(row);
    });
    body.appendChild(card);
  });
  // Extra items from recipes/menu
  if(S.compExtra&&S.compExtra.length>0){
    const lbl=document.createElement('div');lbl.className='clbl';lbl.textContent='🍽 Del menú y recetas';body.appendChild(lbl);
    const card=document.createElement('div');card.className='card';card.style.padding='8px 13px';
    S.compExtra.forEach((item,idx)=>{
      total++;const k='extra::'+item;const isDone=!!S.compDone[k];if(isDone)done++;
      const row=document.createElement('div');row.className='crow';
      row.innerHTML=`<div class="chk ${isDone?'on':''}">${isDone?'✓':''}</div><span class="ctxt ${isDone?'done':''}">${item}</span><button class="cdel" onclick="delExtra(${idx},event)">×</button>`;
      row.querySelector('.chk').onclick=()=>{S.compDone[k]=!S.compDone[k];save();renderCompras();};
      card.appendChild(row);
    });
    body.appendChild(card);
  }
  document.getElementById('pbar').style.width=total?Math.round(done/total*100)+'%':'0%';
}
function delExtra(idx,e){
  e.stopPropagation();
  confirmAction('¿Quitar este ítem?','Se eliminará de la lista de compras.',()=>{
    S.compExtra.splice(idx,1);save();renderCompras();
  });
}
function resetC(){S.compDone={};S.compExtra=[];save();renderCompras();}

load();
if(!S.selDate)S.selDate=dk(new Date());

// Prevent accidental data loss on page close
window.addEventListener('beforeunload',()=>save());

// Verify JS loaded OK
renderHoy();
</script>
